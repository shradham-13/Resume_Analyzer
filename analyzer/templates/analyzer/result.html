<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Analysis Result</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 0;
    }
    .card {
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .score-circle {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      color: white;
      font-size: 45px;
      font-weight: 700;
    }
    .score-high { background: linear-gradient(135deg, #11998e, #38ef7d); }
    .score-mid { background: linear-gradient(135deg, #f7971e, #ffd200); }
    .score-low { background: linear-gradient(135deg, #cb2d3e, #ef473a); }
    h1 { color: #667eea; font-weight: 700; }
    .analysis-box {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 20px;
      white-space: pre-wrap;
      line-height: 1.8;
    }
    .btn-back {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      color: white;
      padding: 12px 40px;
      border-radius: 10px;
      font-size: 18px;
    }
    .score-label {
      font-size: 18px;
      font-weight: 600;
      margin-top: 10px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card p-5">
        <h1 class="text-center mb-2">📊 Analysis Result</h1>
        <p class="text-center text-muted mb-4">Hi <strong>{{ name }}</strong>! Here is your resume analysis.</p>

        <div class="text-center mb-4">
          <div class="score-circle
            {% if score >= 80 %}score-high
            {% elif score >= 60 %}score-mid
            {% else %}score-low{% endif %}">
            {{ score }}
          </div>
          <p class="score-label mt-2">
            {% if score >= 80 %}🟢 Excellent!
            {% elif score >= 60 %}🟡 Average
            {% else %}🔴 Needs Work{% endif %}
          </p>
          <p class="text-muted">ATS Score out of 100</p>
        </div>

        <div class="analysis-box mb-4">
          {{ analysis }}
        </div>

        <div class="text-center">
          <a href="/" class="btn btn-back">
            🔄 Analyze Another Resume
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
